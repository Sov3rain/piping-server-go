name: Node CI

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test

  build_windows:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test

  docker_test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t piping-server .
      - run: docker run -d --rm -p 8080:8080 --name piping-server piping-server
      - run: |
          set -eu
          for _ in 1 2 3 4 5; do
            if curl -fsS http://127.0.0.1:8080/version >/tmp/version.txt; then
              break
            fi
            sleep 1
          done
          grep -Fx "1.12.9" /tmp/version.txt
      - run: |
          set -eu
          rm -f /tmp/received.txt /tmp/sender.txt
          (curl -fsS http://127.0.0.1:8080/ci-transfer > /tmp/received.txt) &
          receiver_pid=$!
          sleep 1
          printf "hello from docker ci" | curl -fsS -T - http://127.0.0.1:8080/ci-transfer > /tmp/sender.txt
          wait "$receiver_pid"
          grep -Fx "[INFO] Transfer completed to 1 receiver(s)." /tmp/sender.txt
          grep -Fx "hello from docker ci" /tmp/received.txt
      - if: always()
        run: docker logs piping-server
      - if: always()
        run: docker stop piping-server
